name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Build EXE (windowed)
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name sql-formatter-gui src/app.py

      - name: Build EXE (console debug)
        run: |
          pyinstaller --noconfirm --clean --onefile --console --name sql-formatter-gui-console src/app.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sql-formatter-gui-windows
          path: |
            dist/sql-formatter-gui.exe
            dist/sql-formatter-gui-console.exe
